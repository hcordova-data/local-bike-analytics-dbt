version: 2

models:
  - name: int_local_bike__orders_enriched
    description: >
      This is the 'Master Record' for order transactions. It joins orders, items, products, 
      customers, and stores. It serves as the single source of truth for all metric calculations 
      used in the Marts.
    
    # --- MODEL LEVEL TESTS (Complex Business Logic) ---
    tests:
      # 1. Logical Sequence: You can't ship a bike before it's ordered.
      - dbt_utils.expression_is_true:
          name: check_shipping_logic
          expression: "shipped_date >= order_date or shipped_date is null"
      
      # 2. Revenue Guardrail: Discounts should never be more than 100%.
      - dbt_utils.expression_is_true:
          name: check_discount_range
          expression: "discount >= 0 and discount <= 1"

    columns:
      # --- KEYS & REFERENTIAL INTEGRITY ---
      - name: order_id
        description: "The unique identifier for the order. Joins back to stg_orders."
        tests:
          - not_null
          - relationships:
              to: ref('stg_local_bike__orders')
              field: order_id

      - name: product_id
        description: "The product identifier. Must exist in the product catalog."
        tests:
          - not_null
          - relationships:
              to: ref('stg_local_bike__products')
              field: product_id

      # --- CALCULATED METRICS ---
      - name: quantity
        description: "Number of units sold. Must be a positive integer."
        tests:
          - dbt_utils.expression_is_true:
              expression: "quantity > 0"

      - name: list_price
        description: "The MSRP at the time of purchase."
        tests:
          - not_null

      - name: discount
        description: "Percentage discount applied (e.g., 0.20 for 20%)."

      # --- DATE INTELLIGENCE ---
      - name: order_date
        description: "The date the customer placed the order."
        tests:
          - not_null

      - name: shipped_date
        description: "The date the order left the store. If NULL, the order is pending/cancelled."