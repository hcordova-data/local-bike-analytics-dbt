version: 2

models:
  - name: fct_bikes_sales
    description: "Daily sales transactions containing revenue and quantity."
    columns:
      - name: order_id
        description: "Primary key of the order."
        tests:
          - not_null
          - unique
      - name: net_revenue
        description: "Revenue after discounts."

  - name: dim_products
    description: "Master product catalog with brand and category names."
    columns:
      - name: product_id
        description: "Unique identifier for the product."
        tests:
          - not_null
          - unique

  - name: fct_bikes_stocks
    description: "Current inventory levels by store and product."
    columns:
      - name: stock_quantity
        tests:
          - not_null